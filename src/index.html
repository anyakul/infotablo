<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Видео</title>
  <link rel="stylesheet" href="css/style.min.css" type="text/css">
</head>

<body class="container-player">
  <div id="player">
    <div class="swiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <video id="homevideo" autoplay src="img/video-1.mp4" muted poster=""></video>
        </div>
      </div>
    </div>
    <div class="info" id="info" style="display: flex">
      <div class="info-column">
        <p class="info-item">
          Погода Тольятти
        </p>
        <p class="info-item">
          <img src="/img/погода.svg" width="20" height="20" alt="погода">
          <span class="info-item-span" id="temp"></span>
        </p>
        <p class="info-item">
          <img src="/img/давление.svg" width="20" height="20" alt="давление">
          <span class="info-item-span" id="pressure"></span>
        </p>
        <p class="info-item">
          <img src="/img/влага.svg" width="20" height="20" alt="Влага">
          <span class="info-item-span" id="humid"></span>
        </p>
        <p class="info-item">
          <img src="img/ветер.svg" width="20" height="20" alt="Ветер">
          <span class="info-item-span" id="wind"></span>
        </p>
      </div>
      <div class="info-column">
        <p class="info-item" id="weekday">Среда</p>
        <p class="info-item" id="current_date">14 мая 2025</p>
        <p class="info-item" id="time">15.30</p>
      </div>
    </div>
  </div>
  <button id="player-fullscreen" type="button">На весь экран</button>
  <h2 class="player-header">Сегодня:</h2>
  <div class="player-blocks">
    <div class="player-block">
      <p class="player-text" data-from="7" data-to="8"></p>
      <ul class="player-list">
        <li class="player-item" data-type="image">
          <span class="player-item-image">
            <video poster="/img/blog.jpg" width="100" height="100"></video>
            <video src="/img/blog.jpg" width="100" height="100"></video>
          <span class="player-file-name"></span>
        </li>
        <li class="player-item" data-type="video">
          <span class="player-item-image">
            <video poster="/img/video-1.mp4" width="100" height="100"></video>
            <video src="/img/video-2.mp4" width="100" height="100"></video>
          <span class="player-file-name"></span>
        </li>
      </ul>
  </div>
  <script src="js/main.min.js"></script>
</body>

</html>
